<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Smart Exam System - Professional Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

    <style>
      
        @media (min-width: 768px) {
            body {
                padding-top: 100px;
                /* للشاشات الكبيرة */
            }
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8faff;
            user-select: none;
            padding-bottom: 120px;
            padding-top: 130px;
        }

        .we-purple {
            color: #7A2F8C;
        }

        .bg-we-purple {
            background-color: #7A2F8C;
        }

        .card {
            background: white;
            border-radius: 20px;
            border: 1px solid #eee;
            transition: 0.3s;
            position: relative;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        .tf-btn {
            border: 2px solid #e2e8f0;
            transition: 0.2s;
            font-weight: 600;
            padding: 12px;
            border-radius: 12px;
            width: 100%;
            text-align: center;
            background: #f9fafb;
            cursor: pointer;
        }

        .selected-true {
            background-color: #22c55e !important;
            color: white;
            border-color: #22c55e;
        }

        .selected-false {
            background-color: #ef4444 !important;
            color: white;
            border-color: #ef4444;
        }

        .mcq-selected {
            background-color: #f3e8ff !important;
            border-color: #7A2F8C !important;
            color: #7A2F8C;
        }

        .correct-card {
            border: 2px solid #22c55e !important;
            background-color: #f0fdf4 !important;
        }

        .wrong-card {
            border: 2px solid #ef4444 !important;
            background-color: #fef2f2 !important;
        }

        .partial-card {
            border: 2px solid #f59e0b !important;
            background-color: #fffbeb !important;
        }

        .input-box {
            width: 100%;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 14px;
            outline: none;
            transition: 0.3s;
        }

        #timer-display {
            font-family: 'Courier New', Courier, monospace;
            font-weight: 800;
        }

        #progress-container {
            position: fixed;
            top: 80px;
            left: 0;
            width: 100%;
            height: 6px;
            background: #e2e8f0;
            z-index: 100;
        }

        #progress-bar {
            width: 0%;
            height: 100%;
            background: #7A2F8C;
            transition: 0.3s;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 10px;
            color: white;
            z-index: 1000;
            display: none;
            animation: slideIn 0.3s;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
            }

            to {
                transform: translateX(0);
            }
        }

        .access-denied-bg {
            background: linear-gradient(135deg, #fff5f5 0%, #ffffff 100%);
        }
    </style>
</head>

<body oncontextmenu="return false;" oncopy="return false;" oncut="return false;" onpaste="return false;">

    <div id="toast" class="toast bg-slate-800 font-bold"></div>

    <header class="fixed top-0 w-full z-50 bg-white/95 backdrop-blur-md shadow-sm border-b border-gray-100">
        <div
            class="max-w-7xl mx-auto px-4 h-auto md:h-[80px] flex flex-col md:flex-row justify-between items-center py-2 md:py-0 gap-3">

            <div class="flex items-center gap-2 md:gap-4 flex-row-reverse overflow-x-auto no-scrollbar max-w-full">
                <img src="../Ministry.png" alt="Ministry" class="h-[30px] md:h-[40px] w-auto object-contain">
                <div class="h-4 w-[1px] bg-gray-200 hidden md:block"></div>
                <img src="../pplied Technology.png" alt="Applied Tech"
                    class="h-[30px] md:h-[40px] w-auto object-contain">
                <div class="h-4 w-[1px] bg-gray-200 hidden md:block"></div>
                <img src="../WE Schools for Applied Technology.png" alt="WE Schools"
                    class="h-[30px] md:h-[40px] w-auto object-contain">
                <div class="h-4 w-[1px] bg-gray-200 hidden md:block"></div>
                <img src="../Galaxy Academy for Development.png" alt="Galaxy Academy"
                    class="h-[30px] md:h-[40px] w-auto object-contain">
            </div>

            <div class="flex items-center gap-4">
                <div class="text-center bg-gray-50 px-3 py-1 rounded-xl border border-gray-100 shadow-sm min-w-[100px]">
                    <h1 id="timer-display"
                        class="text-lg md:text-2xl text-red-600 font-black tabular-nums leading-none">10:00</h1>
                    <p id="progress-text"
                        class="text-[8px] md:text-[10px] font-bold text-gray-500 uppercase tracking-tighter">0/20</p>
                </div>

                <div class="hidden sm:flex items-center">
                    <span class="text-[#7A2F8C] font-black text-xs md:text-sm uppercase">Quiz Mode</span>
                </div>
            </div>
        </div>
    </header>

    <div id="progress-container">
        <div id="progress-bar"></div>
    </div>

    <main class="max-w-3xl mx-auto p-6 mt-4">
        <div id="quiz-container" class="space-y-6"></div>

        <div class="mt-10 text-center hidden" id="submit-area">
            <button onclick="confirmSubmit()" id="main-submit-btn"
                class="bg-we-purple text-white px-20 py-5 rounded-2xl font-extrabold text-xl hover:scale-105 transition-all shadow-xl">
                Submit Exam Now
            </button>
        </div>
    </main>

    <div id="result-modal"
        class="fixed inset-0 bg-slate-900/90 hidden flex items-center justify-center z-[200] backdrop-blur-md">
        <div class="bg-white p-10 rounded-[2.5rem] max-w-md w-full text-center shadow-2xl">
            <span class="material-symbols-outlined text-6xl text-green-500">check_circle</span>
            <h2 class="text-2xl font-black text-slate-800 mt-4">Exam Completed!</h2>
            <div id="final-score-points" class="text-5xl font-black text-we-purple my-6">0 / 0</div>
            <p class="text-gray-500 mb-8 font-semibold">You can now review your answers and check the correct
                explanations below.</p>

            <button onclick="reviewOnly()"
                class="flex items-center justify-center gap-3 w-full bg-we-purple text-white py-4 rounded-xl font-bold hover:bg-purple-800 transition-all">
                <span class="material-symbols-outlined">visibility</span> Review Correct Answers
            </button>
        </div>
    </div>

    <script>
        const POINT_SYSTEM = { tf: 1, mcq: 1, essay: 1 };
        let unitsQuestions = [];
        let currentSubset = [];
        let examFinished = false;
        let tabSwitchCount = 0;
        let timeLeft = 600; // 10 minutes
        let timerInterval;

        const ANS_KEY = 'exam_ans_storage';
        const Q_KEY = 'exam_questions_storage';

        // --- نظام الدروس الثابت ---
        const LESSON_RANGES = {
            1: { start: 0, end: 50 },
            2: { start: 50, end: 100 },
            3: { start: 100, end: 150 },
            4: { start: 150, end: 200 },
            5: { start: 200, end: 250 }
        };

        // منع الخروج بالخطأ
        window.onbeforeunload = function () {
            if (!examFinished) return "Are you sure you want to leave the exam?";
        };

        function initExam() {
            const unitNum = localStorage.getItem('unitNumber');
            const lessonNum = localStorage.getItem('selectedLesson');

            if (!unitNum || !lessonNum) {
                alert("Please select the unit and lesson from the homepage");
                window.location.href = "../index.html";
                return;
            }

            const script = document.createElement('script');
            script.src = `./unit${unitNum}.js`;

            script.onload = function () {
                try {
                    if (typeof allQuestionsData === 'undefined') {
                        throw new Error("Questions file loaded but data is missing.");
                    }

                    unitsQuestions = allQuestionsData;
                    const range = LESSON_RANGES[lessonNum] || LESSON_RANGES[1];
                    let pool = unitsQuestions.slice(range.start, range.end);

                    if (pool.length === 0) throw new Error("No questions found in this range.");

                    const shuffle = (array) => array.sort(() => Math.random() - 0.5);

                    const getUniqueQuestions = (type) => {
                        const filtered = pool.filter(q => q.type === type);
                        const uniqueMap = new Map();
                        filtered.forEach(item => uniqueMap.set(item.q, item));
                        return shuffle(Array.from(uniqueMap.values()));
                    };

                    const essayPool = getUniqueQuestions('essay');
                    const objectivePool = pool.filter(q => q.type !== 'essay');

                    const uniqueObjectiveMap = new Map();
                    objectivePool.forEach(item => uniqueObjectiveMap.set(item.q, item));
                    const uniqueObjectivePool = shuffle(Array.from(uniqueObjectiveMap.values()));

                    currentSubset = [
                        ...essayPool.slice(0, 14),
                        ...uniqueObjectivePool.slice(0, 6)
                    ];

                    currentSubset = shuffle(currentSubset);

                    renderUI();
                    startTimer();

                } catch (error) {
                    showErrorUI(unitNum);
                }
            };

            script.onerror = function () {
                showErrorUI(unitNum);
            };

            document.head.appendChild(script);
        }

        function showErrorUI(num) {
            document.getElementById('quiz-container').innerHTML =
                `<div class='text-center p-10 bg-red-50 rounded-2xl border-2 border-red-200'>
                    <p class='font-bold text-red-500'>⚠️ Error Loading Questions</p>
                    <p class='text-sm text-gray-500'>Could not find file: unit${num}</p>
                </div>`;
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                let mins = Math.floor(timeLeft / 60);
                let secs = timeLeft % 60;
                document.getElementById('timer-display').innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;

                if (timeLeft <= 60) document.getElementById('timer-display').classList.add('animate-pulse');

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    submitQuiz();
                    showToast("⏰ Time is up! Exam auto-submitted.", "bg-red-700");
                }
                timeLeft--;
            }, 1000);
        }

        function renderUI() {
            const container = document.getElementById('quiz-container');
            container.innerHTML = '';
            currentSubset.forEach((q, i) => {
                const div = document.createElement('div');
                div.id = `q-block-${i}`;
                div.className = "card p-8 mb-6";
                let html = `
                    <div class="flex justify-between items-center mb-6">
                        <span class="text-[10px] font-black uppercase text-gray-400">Question ${i + 1}</span>
                        <span id="pts-${i}" class="text-xs font-bold text-we-purple bg-purple-50 px-4 py-1.5 rounded-full uppercase">Pts: ${POINT_SYSTEM[q.type]}</span>
                    </div>
                    <h3 class="text-xl font-bold mb-6">${q.q}</h3>`;

                if (q.type === 'tf') {
                    html += `<div class="grid grid-cols-2 gap-4">
                        <button onclick="saveAnswer(${i}, 'true', this)" class="tf-btn">True</button>
                        <button onclick="saveAnswer(${i}, 'false', this)" class="tf-btn">False</button>
                    </div>`;
                } else if (q.type === 'mcq') {
                    html += `<div class="space-y-3">
                        ${q.opts.map(o => `<button onclick="saveAnswer(${i}, '${o}', this)" class="tf-btn text-left px-6">${o}</button>`).join('')}
                    </div>`;
                } else {
                    html += `<textarea oninput="saveAnswer(${i}, this.value)" class="input-box h-32" placeholder="Explain your answer here..."></textarea>`;
                }
                html += `<div id="err-${i}" class="mt-4 p-4 rounded-xl bg-slate-100 text-slate-700 text-sm hidden"></div>`;
                div.innerHTML = html;
                container.appendChild(div);
            });
            document.getElementById('submit-area').classList.remove('hidden');
        }

        function saveAnswer(idx, val, btn) {
            if (examFinished) return;
            currentSubset[idx].userAns = val;
            if (btn && btn.tagName === 'BUTTON') {
                btn.parentElement.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('selected-true', 'selected-false', 'mcq-selected'));
                if (val === 'true') btn.classList.add('selected-true');
                else if (val === 'false') btn.classList.add('selected-false');
                else btn.classList.add('mcq-selected');
            }
            updateProgress();
        }

        function updateProgress() {
            const answered = currentSubset.filter(q => q.userAns).length;
            const percent = (answered / currentSubset.length) * 100;
            document.getElementById('progress-bar').style.width = percent + "%";
            document.getElementById('progress-text').innerText = `Answered: ${answered}/${currentSubset.length}`;
        }

        function confirmSubmit() {
            if (confirm("Are you sure you want to submit? You won't be able to change answers.")) submitQuiz();
        }

        const GEMINI_API_KEY = "AIzaSyBBASiBIRkmubcB6A7ufrrcG75hhd7SUck";
        // 1. استبدلي مفتاح الـ API الخاص بك هنا
        async function submitQuiz() {
            if (examFinished) return;
            examFinished = true;
            clearInterval(timerInterval);

            // إظهار رسالة "جاري التصحيح"
            showToast("⏳ AI is grading your essay answers... Please wait.", "bg-blue-600");
            document.getElementById('main-submit-btn').disabled = true;
            document.getElementById('main-submit-btn').innerText = "Grading...";

            let totalEarned = 0;
            let maxPoints = 0;

            // سنقوم بمعالجة كل سؤال
            for (let i = 0; i < currentSubset.length; i++) {
                const q = currentSubset[i];
                const userVal = q.userAns || "";
                const fullPts = POINT_SYSTEM[q.type];
                maxPoints += fullPts;
                let score = 0;

                if (q.type === 'essay' && userVal.trim() !== "") {
                    // تصحيح بالذكاء الاصطناعي
                    score = await getAIScore(userVal, q.a, fullPts);
                } else if (q.type === 'essay' && userVal.trim() === "") {
                    score = 0;
                } else {
                    // تصحيح تلقائي للـ MCQ و T/F
                    score = (userVal.toLowerCase().trim() === q.a.toLowerCase().trim()) ? fullPts : 0;
                }

                totalEarned += parseFloat(score);
                styleFeedback(i, score, fullPts, q.a);
            }

            // إظهار النتيجة النهائية
            document.getElementById('final-score-points').innerText = `${totalEarned.toFixed(2)} / ${maxPoints}`;
            document.getElementById('result-modal').classList.remove('hidden');
            window.scrollTo(0, 0);
        }

        async function getAIScore(userAnswer, correctAnswer, maxPoints) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`;

            const prompt = `
                You are a professional teacher grading a student's answer.
                Correct Answer: "${correctAnswer}"
                Student Answer: "${userAnswer}"
                Max Points: ${maxPoints}
                
                Rules:
                1. Compare the meaning, not just the exact words. 
                2. If the student has small spelling mistakes but the meaning is clear, don't deduct points.
                3. If the answer is partially correct, give a partial score (e.g., 0.5 or 0.75).
                4. Return ONLY a single number representing the score. No text, no explanation.
            `;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }]
                    })
                });
                const data = await response.json();
                const aiResponse = data.candidates[0].content.parts[0].text.trim();
                const score = parseFloat(aiResponse);
                return isNaN(score) ? 0 : Math.min(score, maxPoints);
            } catch (error) {
                console.error("AI Error:", error);
                // Fallback: لو الـ AI فشل، نستخدم الطريقة القديمة البسيطة
                return calculateFallbackScore(userAnswer, correctAnswer, maxPoints);
            }
        }

        // دالة احتياطية في حال انقطاع الإنترنت أو فشل الـ AI
        function calculateFallbackScore(user, correct, max) {
            let u = user.toLowerCase().trim();
            let c = correct.toLowerCase().trim();
            if (u === c) return max;
            let intersect = u.split(' ').filter(w => c.includes(w)).length;
            let ratio = intersect / c.split(' ').length;
            if (ratio >= 0.8) return max;
            if (ratio >= 0.4) return max * 0.5;
            return 0;
        }

        // تعديل بسيط على دالة الاستايل عشان تقبل الكسور
        function styleFeedback(i, score, full, correctA) {
            const block = document.getElementById(`q-block-${i}`);
            const err = document.getElementById(`err-${i}`);
            const ptsLabel = document.getElementById(`pts-${i}`);

            if (score >= full) {
                block.classList.add('correct-card');
            } else if (score > 0) {
                block.classList.add('partial-card');
                ptsLabel.innerText = `Earned: ${score} / ${full}`; // إظهار الدرجة الجزئية
            } else {
                block.classList.add('wrong-card');
            }

            err.innerHTML = `<b>Correct Answer:</b> ${correctA}`;
            err.classList.remove('hidden');
            block.querySelectorAll('button, textarea').forEach(el => el.disabled = true);
        }


        function calculateEssayScore(user, correct, syns, max) {
            if (!user) return 0;
            let u = user.toLowerCase();
            let c = correct.toLowerCase();
            for (let s in syns) { syns[s].forEach(word => u = u.replace(word, s)); }
            let intersect = u.split(' ').filter(w => c.includes(w)).length;
            let ratio = intersect / c.split(' ').length;
            if (ratio >= 0.7) return max;
            if (ratio >= 0.4) return max * 0.5;
            return 0;
        }

        function reviewOnly() {
            document.getElementById('result-modal').classList.add('hidden');
        }
        function showToast(msg, bgColor) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.className = `toast font-bold ${bgColor}`;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 3000);
        }
        // الحماية من تبديل التاب
        window.addEventListener('blur', () => {
            if (examFinished) return;
            tabSwitchCount++;
            if (tabSwitchCount === 1) showToast("⚠️ Warning! Don't leave the exam page.", "bg-orange-600");
            else if (tabSwitchCount >= 2) submitQuiz();
        });

        window.onload = initExam;
    </script>
</body>

</html>
