<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />

    <title>Smart Exam System - Final Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet"

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8faff;
            user-select: none;
            padding-top: 100px;
            padding-bottom: 120px;
        }

        .we-purple {
            color: #7A2F8C;
        }

        .bg-we-purple {
            background-color: #7A2F8C;
        }

        .card {
            background: white;
            border-radius: 20px;
            border: 1px solid #eee;
            transition: 0.3s;
            position: relative;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        .tf-btn {
            border: 2px solid #e2e8f0;
            transition: 0.2s;
            font-weight: 600;
            padding: 12px;
            border-radius: 12px;
            width: 100%;
            text-align: center;
            background: #f9fafb;
            cursor: pointer;
        }

        .selected-true {
            background-color: #22c55e !important;
            color: white;
            border-color: #22c55e;
        }

        .selected-false {
            background-color: #ef4444 !important;
            color: white;
            border-color: #ef4444;
        }

        .mcq-selected {
            background-color: #f3e8ff !important;
            border-color: #7A2F8C !important;
            color: #7A2F8C;
        }

        .correct-card {
            border: 2px solid #22c55e !important;
            background-color: #f0fdf4 !important;
        }

        .wrong-card {
            border: 2px solid #ef4444 !important;
            background-color: #fef2f2 !important;
        }

        .partial-card {
            border: 2px solid #f59e0b !important;
            background-color: #fffbeb !important;
        }

        .input-box {
            width: 100%;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 14px;
            outline: none;
            transition: 0.3s;
        }

        #progress-container {
            position: fixed;
            top: 80px;
            left: 0;
            width: 100%;
            height: 6px;
            background: #e2e8f0;
            z-index: 100;
        }

        #progress-bar {
            width: 0%;
            height: 100%;
            background: #7A2F8C;
            transition: 0.3s;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 10px;
            color: white;
            z-index: 1000;
            display: none;
            animation: slideIn 0.3s;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
            }

            to {
                transform: translateX(0);
            }
        }

        // --- نظام الأسئلة والتخزين ---
        function initExam(isNew = false) {
            // 1. جلب رقم الوحدة الحالي اللي الطالب اختاره
            const unitNum = localStorage.getItem('unitNumber') || "14";
            const unitData = unitsQuestions[unitNum] || [];

            // 2. جلب رقم الوحدة اللي كان متسيف في الأسئلة القديمة
            const savedQuestions = localStorage.getItem(Q_KEY);
            let savedUnit = null;
            if (savedQuestions) {
                const parsed = JSON.parse(savedQuestions);
                // بنفترض إن كل الأسئلة في الـ Storage من نفس الوحدة، فنشوف أول سؤال
                // ملاحظة: لازم نتأكد إن الأسئلة فيها رقم الوحدة أو نمسح لو مفيش تطابق
            }

            // 3. المنطق الذكي: لو طلب أسئلة جديدة، أو مفيش أسئلة، أو "المستوى اتغير"
            // ضفنا شرط: لو الـ unitNum الحالي مختلف عن اللي الطالب دخله قبل كده
            const lastUnit = localStorage.getItem('last_unit_entered');

            if (isNew || !savedQuestions || lastUnit !== unitNum) {
                // مسح كل حاجة قديمة لأننا غيرنا الوحدة أو المستوى
                localStorage.removeItem(Q_KEY);
                localStorage.removeItem(ANS_KEY);

                // خلط واختيار 20 سؤال جديد من الوحدة الجديدة
                currentSubset = [...unitData].sort(() => 0.5 - Math.random()).slice(0, 20);

                // حفظ الأسئلة الجديدة وحفظ رقم الوحدة الحالي عشان المرة الجاية نعرف لو اتغير
                localStorage.setItem(Q_KEY, JSON.stringify(currentSubset));
                localStorage.setItem('last_unit_entered', unitNum);
            } else {
                // لو لسه في نفس الوحدة، حمل الأسئلة القديمة عادي عشان لو عمل Refresh
                currentSubset = JSON.parse(savedQuestions);
            }

            renderUI();
        }

        function renderUI() {
            const container = document.getElementById('quiz-container');
            container.innerHTML = '';
            const savedAnswers = JSON.parse(localStorage.getItem(ANS_KEY) || "{}");

            currentSubset.forEach((q, i) => {
                const div = document.createElement('div');
                div.id = `q-block-${i}`;
                div.className = "card p-8 mb-6";
                let savedVal = savedAnswers[i] || "";

                let html = `<div class="flex justify-between items-center mb-6">
                    <span class="text-[10px] font-black uppercase text-gray-400">Q ${i + 1} • ${q.type.toUpperCase()}</span>
                    <span id="pts-${i}" class="text-xs font-bold text-we-purple bg-purple-50 px-4 py-1.5 rounded-full uppercase">Pts: ${POINT_SYSTEM[q.type]}</span>
                </div><h3 class="text-xl font-bold mb-6">${q.q}</h3>`;

                if (q.type === 'tf') {
                    html += `<div class="grid grid-cols-2 gap-4">
                        <button onclick="saveAnswer(${i}, 'true', this)" class="tf-btn ${savedVal === 'true' ? 'selected-true' : ''}">True</button>
                        <button onclick="saveAnswer(${i}, 'false', this)" class="tf-btn ${savedVal === 'false' ? 'selected-false' : ''}">False</button>
                    </div>`;
                } else if (q.type === 'mcq') {
                    html += `<div class="space-y-3">
                        ${q.opts.map(o => `<button onclick="saveAnswer(${i}, '${o}', this)" class="tf-btn text-left px-6 ${savedVal === o ? 'mcq-selected' : ''}">${o}</button>`).join('')}
                    </div>`;
                } else {
                    html += `<textarea oninput="saveAnswer(${i}, this.value)" class="input-box h-32" placeholder="Write your answer...">${savedVal}</textarea>`;
                }
                html += `<div id="err-${i}" class="mt-4 p-4 rounded-xl bg-red-100 text-red-700 text-sm font-bold hidden"></div>`;
                div.innerHTML = html;
                container.appendChild(div);
            });
            updateProgress();
            document.getElementById('submit-area').classList.remove('hidden');
        }

        function saveAnswer(idx, val, btn) {
            if (examFinished) return;
            let saved = JSON.parse(localStorage.getItem(ANS_KEY) || "{}");
            saved[idx] = val;
            localStorage.setItem(ANS_KEY, JSON.stringify(saved));
            if (btn && btn.tagName === 'BUTTON') {
                const p = btn.parentElement;
                p.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('selected-true', 'selected-false', 'mcq-selected'));
                if (val === 'true') btn.classList.add('selected-true');
                else if (val === 'false') btn.classList.add('selected-false');
                else btn.classList.add('mcq-selected');
            }
            updateProgress();
        }

        function updateProgress() {
            const saved = JSON.parse(localStorage.getItem(ANS_KEY) || "{}");
            const count = Object.keys(saved).length;
            const percent = (count / currentSubset.length) * 100;
            document.getElementById('progress-bar').style.width = percent + "%";
            document.getElementById('progress-text').innerText = `Answered: ${count}/${currentSubset.length}`;
        }

        // --- التصحيح الذكي ---
        function submitQuiz() {
            if (examFinished) return;
            examFinished = true;
            let totalEarned = 0;
            let maxPoints = 0;
            const saved = JSON.parse(localStorage.getItem(ANS_KEY) || "{}");

            currentSubset.forEach((q, i) => {
                const userVal = (saved[i] || "").trim();
                const block = document.getElementById(`q-block-${i}`);
                const fullPts = POINT_SYSTEM[q.type];
                maxPoints += fullPts;
                let score = 0;

                if (q.type === 'essay') {
                    // Logic مقارنة النصوص (string-similarity)
                    score = calculateEssayScore(userVal, q.a, q.syns || {}, fullPts);
                } else {
                    score = (userVal.toLowerCase() === q.a.toLowerCase()) ? fullPts : 0;
                }

                totalEarned += score;
                styleFeedback(block, score, fullPts, i, q.a);
            });

            const finalPercent = (totalEarned / maxPoints) * 100;
            showResults(Math.round(finalPercent), totalEarned, maxPoints);
            localStorage.removeItem(ANS_KEY); // مسح بعد التسليم
        }

        function calculateEssayScore(user, correct, syns, max) {
            if (!user) return 0;
            // تبسيط خوارزمية التشابه للنصوص
            let u = user.toLowerCase();
            let c = correct.toLowerCase();
            // استبدال المرادفات
            for (let s in syns) { syns[s].forEach(word => u = u.replace(word, s)); }

            let intersect = u.split(' ').filter(w => c.includes(w)).length;
            let ratio = intersect / c.split(' ').length;

            if (ratio >= 0.75) return max;
            if (ratio >= 0.50) return max * 0.75;
            if (ratio >= 0.30) return max * 0.5;
            if (ratio >= 0.15) return max * 0.25;
            return 0;
        }

        function styleFeedback(block, score, full, i, correctA) {
            const ptsLabel = document.getElementById(`pts-${i}`);
            const err = document.getElementById(`err-${i}`);
            if (score === full) block.classList.add('correct-card');
            else if (score > 0) block.classList.add('partial-card');
            else block.classList.add('wrong-card');

            ptsLabel.innerText = `Score: ${score}/${full}`;
            if (score < full) {
                err.innerText = `Correct Answer: ${correctA}`;
                err.classList.remove('hidden');
            }
            block.querySelectorAll('button, textarea').forEach(el => el.disabled = true);
        }

        function showResults(percent, earned, max) {
            document.getElementById('final-score-percent').innerText = percent + "%";
            document.getElementById('score-summary').innerText = `Total Score: ${earned} / ${max} Points`;
            document.getElementById('result-modal').classList.remove('hidden');
        }

        // --- أزرار المودال الجديدة ---
        function reviewOnly() {
            document.getElementById('result-modal').classList.add('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function restartExam(isNew) {
            if (isNew) localStorage.removeItem(Q_KEY);
            location.reload();
        }

        function showToast(msg, colorClass) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.className = `toast font-bold ${colorClass}`;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 4000);
        }

        window.onload = () => initExam(false);
    </script>
</body>

</html>
